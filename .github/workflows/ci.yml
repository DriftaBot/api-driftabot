name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check drift_guard_agent/

      - name: Smoke test
        run: python -c "from drift_guard_agent.graph import build_graph; build_graph(); print('Graph OK')"

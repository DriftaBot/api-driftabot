name: DriftaBot Agent

on:
  pull_request:

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DriftaBot/agent@v2
        with:
          org-read-token: ${{ secrets.ORG_READ_TOKEN }}
          consumer-repos: |
            your-org/service-a
            your-org/service-b
          # anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

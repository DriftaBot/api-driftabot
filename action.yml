name: 'DriftaBot Agent'
description: 'Detect breaking API changes in a PR and open GitHub Issues in affected consumer repos — zero config on consumer side.'
author: 'pgomes13'

branding:
  icon: 'alert-triangle'
  color: 'red'

inputs:
  base-schema:
    description: 'Override: path to the base schema file. Auto-detected if omitted.'
    required: false
    default: ''
  head-schema:
    description: 'Override: path to the head schema file. Defaults to base-schema value.'
    required: false
    default: ''
  org-read-token:
    description: 'GitHub PAT with repo (or public_repo) + read:org scopes. Required to search, clone, and open issues in consumer repos. Falls back to GITHUB_TOKEN (cannot open issues in other repos).'
    required: false
    default: ''
  anthropic-api-key:
    description: 'Anthropic API key. Enables Claude-powered risk analysis in opened issues.'
    required: false
    default: ''
  consumer-repos:
    description: 'Newline or comma-separated list of consumer repos to scan (e.g. org/repo). When set, skips org-wide code search and scans only these repos.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install drift-guard (latest release)
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: bash "$GITHUB_ACTION_PATH/action/install-engine.sh"

    - name: Install drift-agent
      shell: bash
      run: pip install --quiet "$GITHUB_ACTION_PATH"

    - name: Set up workspace
      shell: bash
      run: |
        mkdir -p /tmp/specs /tmp/scripts
        cp -r "$GITHUB_ACTION_PATH/scripts/." /tmp/scripts/
        chmod -R +x /tmp/scripts/

    - name: Set up pnpm (if needed)
      if: hashFiles('pnpm-lock.yaml') != ''
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Detect project type
      id: detect
      shell: bash
      run: bash /tmp/scripts/detect.sh

    - name: Generate head schema
      shell: bash
      env:
        TYPE: ${{ steps.detect.outputs.type }}
        OVERRIDE_HEAD: ${{ inputs.head-schema }}
        OVERRIDE_BASE: ${{ inputs.base-schema }}
      run: bash "$GITHUB_ACTION_PATH/action/generate-head.sh"

    - name: Generate base schema
      shell: bash
      env:
        TYPE: ${{ steps.detect.outputs.type }}
        OVERRIDE_BASE: ${{ inputs.base-schema }}
        BASE_REF: ${{ github.base_ref }}
      run: bash "$GITHUB_ACTION_PATH/action/generate-base.sh"

    - name: Compare schemas
      id: diff
      shell: bash
      env:
        TYPE: ${{ steps.detect.outputs.type }}
      run: bash "$GITHUB_ACTION_PATH/action/compare.sh"

    - name: Scan consumers and open issues
      if: steps.diff.outputs.breaking != '0'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        ORG_READ_TOKEN: ${{ inputs.org-read-token != '' && inputs.org-read-token || github.token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CONSUMER_REPOS: ${{ inputs.consumer-repos }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: bash "$GITHUB_ACTION_PATH/action/scan-consumers.sh"

    - name: Cleanup
      if: always()
      shell: bash
      run: bash "$GITHUB_ACTION_PATH/action/cleanup.sh"
